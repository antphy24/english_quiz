<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishScore C1 Training</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="stats-bar">
                <span id="score">Score: 0</span>
                <span id="timer">00:00</span>
            </div>
            <div class="progress-container">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <p id="progressText">Question 1 / 20</p>
        </header>

        <main id="quiz-card" class="card">
            <h2 id="question">Loading question...</h2>
            <div id="options" class="options-grid"></div>
            
            <div id="feedback" class="feedback-area hidden">
                <p id="feedback-text"></p>
                <p id="explanation" class="explanation-text"></p>
            </div>
        </main>

        <footer>
            <button id="nextBtn" class="primary-btn" disabled>Next Question</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
