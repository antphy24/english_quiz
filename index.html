<!DOCTYPE html>
<html>
<head>
  <title>EnglishScore C1 Training Quiz</title>
</head>

<body style="font-family:Arial; max-width:600px; margin:auto;">

<h2>EnglishScore Training (B2 → C1)</h2>

<p id="progressText"></p>
<div style="background:#ddd;height:10px;width:100%">
  <div id="progressBar" style="height:10px;background:green;width:0%"></div>
</div>

<p id="timer">Time: 0s</p>
<p id="score">Score: 0</p>

<h3 id="question"></h3>
<div id="options"></div>

<p id="feedback"></p>

<button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>

<script>
const questions = [
  {
    q: "She made a ______ to study abroad.",
    options: ["decision", "choice", "selection", "plan"],
    answer: 0,
    explanation: "'Make a decision' is the correct collocation."
  },
  {
    q: "He is interested ______ learning Spanish.",
    options: ["on", "in", "at", "for"],
    answer: 1,
    explanation: "'Interested in' is correct."
  },
  {
    q: "They suggested ______ earlier.",
    options: ["to leave", "leaving", "leave", "left"],
    answer: 1,
    explanation: "'Suggest' is followed by -ing."
  },
  {
    q: "She has lived here ______ 2015.",
    options: ["since", "for", "from", "during"],
    answer: 0,
    explanation: "'Since' is used with a point in time."
  },
  {
    q: "We need to ______ attention.",
    options: ["make", "take", "pay", "do"],
    answer: 2,
    explanation: "'Pay attention' is correct."
  },
  {
    q: "They will ______ a new company.",
    options: ["set up", "set off", "set out", "set back"],
    answer: 0,
    explanation: "'Set up' = establish."
  },
  {
    q: "If I ______ you, I would accept.",
    options: ["was", "were", "am", "be"],
    answer: 1,
    explanation: "Formal: 'If I were you'."
  },
  {
    q: "He avoided ______ the issue.",
    options: ["answer", "to answer", "answering", "answered"],
    answer: 2,
    explanation: "'Avoid' takes -ing."
  },
  {
    q: "Rarely ______ such an event.",
    options: ["we see", "have we seen", "we have seen", "see we"],
    answer: 1,
    explanation: "Inversion → 'have we seen'."
  },
  {
    q: "He must have ______ it earlier.",
    options: ["see", "seen", "saw", "seeing"],
    answer: 1,
    explanation: "Modal perfect → past participle."
  },
  {
    q: "It had a strong ______ on results.",
    options: ["impact", "effect", "result", "cause"],
    answer: 0,
    explanation: "'Impact on' is most natural."
  },
  {
    q: "Students ______ hard succeed.",
    options: ["study", "studying", "studied", "to study"],
    answer: 1,
    explanation: "Reduced clause: 'students studying'."
  },
  {
    q: "Only then ______ the truth.",
    options: ["he realized", "did he realize", "he did realize", "realized he"],
    answer: 1,
    explanation: "Inversion → 'did he realize'."
  },
  {
    q: "If he had tried, he ______ now.",
    options: ["would succeed", "would be succeeding", "would have succeeded", "succeeds"],
    answer: 1,
    explanation: "Mixed conditional."
  },
  {
    q: "She is capable ______ solving it.",
    options: ["of", "to", "for", "in"],
    answer: 0,
    explanation: "'Capable of' is fixed."
  },
  {
    q: "He stopped ______ when sick.",
    options: ["to smoke", "smoking", "smoke", "smoked"],
    answer: 1,
    explanation: "'Stopped smoking' = quit."
  },
  {
    q: "Having ______, he left.",
    options: ["finish", "finished", "finishing", "to finish"],
    answer: 1,
    explanation: "Participle clause uses past participle."
  },
  {
    q: "He is believed ______ the best.",
    options: ["to be", "be", "being", "been"],
    answer: 0,
    explanation: "'Believed to be'."
  },
  {
    q: "She took advantage ______ it.",
    options: ["from", "of", "on", "with"],
    answer: 1,
    explanation: "'Take advantage of'."
  },
  {
    q: "Not only ______ talented, but hardworking.",
    options: ["she is", "is she", "she was", "was she"],
    answer: 1,
    explanation: "Inversion after 'not only'."
  }
];

let current = 0;
let score = 0;
let time = 0;
let answered = false;

setInterval(() => {
  time++;
  document.getElementById("timer").innerText = "Time: " + time + "s";
}, 1000);

function loadQuestion() {
  let q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progressText").innerText =
    `Question ${current + 1} / ${questions.length}`;

  let progress = ((current) / questions.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";

  let optionsHTML = "";
  q.options.forEach((opt, i) => {
    optionsHTML += `<button onclick="checkAnswer(${i})" 
      style="display:block;margin:6px 0;width:100%" id="btn${i}">
      ${opt}
    </button>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
  document.getElementById("feedback").innerText = "";
  document.getElementById("nextBtn").disabled = true;
  answered = false;
}

function checkAnswer(i) {
  if (answered) return; // LOCK

  answered = true;

  let q = questions[current];

  // Disable all buttons
  q.options.forEach((_, index) => {
    document.getElementById("btn" + index).disabled = true;
  });

  if (i === q.answer) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("feedback").innerHTML =
      "✅ Correct<br>Explanation: " + q.explanation;
  } else {
    document.getElementById("feedback").innerHTML =
      "❌ Incorrect<br>Correct answer: " +
      q.options[q.answer] +
      "<br>Explanation: " +
      q.explanation;
  }

  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
  current++;

  if (current < questions.length) {
    loadQuestion();
  } else {
    document.getElementById("progressBar").style.width = "100%";
    document.body.innerHTML =
      `<h2>✅ Finished</h2>
       <p>Score: ${score}/20</p>
       <p>Time: ${time}s</p>`;
  }
}

loadQuestion();
</script>

</body>
</html>
``
